services:
  mlflow:
    image: python:3.10-slim
    command: >
      sh -c "pip install mlflow -q &&
             mlflow server --host 0.0.0.0 --port 5000
             --backend-store-uri sqlite:///mlflow/mlflow.db
             --default-artifact-root /mlflow/artifacts"
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    networks:
      - f4_network

  app:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - ./models:/app/models
      - ./config:/app/config
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      - mlflow
    networks:
      - f4_network

volumes:
  mlflow_data:

networks:
  f4_network:
