services:
  mlflow:
    image: python:3.14-slim
    command: >
      sh -c "pip install mlflow -q &&
             mlflow server --host 0.0.0.0 --port 5000
             --backend-store-uri sqlite:///mlflow/mlflow.db
             --default-artifact-root /mlflow/artifacts"
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    networks:
      - f4_network

  app:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - ./models:/app/models
      - ./config:/app/config
      - huggingface_cache:/root/.cache/huggingface
    env_file:
      - .env
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      - mlflow
    networks:
      - f4_network
    command: >
      sh -c "if [ ! -f models/faiss_index/index.faiss ]; then
               echo '=== Construyendo indice FAISS desde embeddings ===' &&
               python -m src.pipeline;
             fi &&
             streamlit run app/app.py --server.port=8501 --server.address=0.0.0.0"

volumes:
  mlflow_data:
  huggingface_cache:

networks:
  f4_network:
